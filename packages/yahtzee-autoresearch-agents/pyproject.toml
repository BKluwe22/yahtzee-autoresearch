[project]
name = "yahtzee-autoresearch-agents"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Bjorn Kluwe", email = "bjoern.kluwe@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "claude-agent-sdk>=0.1.63",
    "jinja2>=3.1",
    "yahtzee-autoresearch-common",
]

[project.scripts]
yahtzee-autoresearch-agents = "yahtzee_autoresearch_agents:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
yahtzee-autoresearch-common = { workspace = true }
yahtzee-autoresearch-evaluation = { workspace = true }
