[project]
name = "yahtzee-autoresearch-strategy"
version = "0.1.0"
description = "Yahtzee strategy — the `act` function the agent iterates on."
readme = "README.md"
authors = [
    { name = "Bjorn Kluwe", email = "bjoern.kluwe@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "yahtzee-autoresearch-common",
]

[tool.uv.sources]
yahtzee-autoresearch-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
